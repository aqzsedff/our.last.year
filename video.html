<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Метатеги -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Our last year</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Сброс стандартных отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Стили для body */
        body {
            background: #c9b3aa;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Основной контейнер */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: #000;
        }
        
        /* Контейнер видео */
        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* Видеоплеер - ПО ВЫСОТЕ, НЕ ПО ШИРИНЕ */
        #mainVideo {
            height: 100%;
            width: auto;
            display: block;
            object-fit: contain;
        }
        
        /* Блок с кнопками управления - ПОВЕРХ ВИДЕО */
        .video-controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            padding: 0 20px;
            z-index: 10;
        }
        
        /* Стили кнопок */
        .story-button {
            background: rgba(223, 199, 188, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(199, 171, 160, 0.5);
            color: #402f29;
            padding: 14px 38px;
            border-radius: 50px;
            font-size: 1.2rem;
            text-decoration: none;
            display: inline-block;
            transition: 0.15s;
            cursor: pointer;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            min-width: 140px;
        }
        
        /* Ховер для кнопок */
        .story-button:hover {
            background: rgba(236, 215, 205, 0.95);
            transform: scale(1.03);
        }
        
        .story-button:active {
            transform: scale(0.95);
        }
        
        /* Адаптив для мобилок */
        @media (max-width: 500px) {
            .video-controls {
                bottom: 30px;
                gap: 12px;
                padding: 0 16px;
            }
            .story-button {
                padding: 12px 20px;
                font-size: 0.95rem;
                min-width: 100px;
            }
        }

        @media (max-width: 380px) {
            .video-controls {
                bottom: 20px;
                gap: 8px;
                padding: 0 12px;
            }
            .story-button {
                padding: 10px 16px;
                font-size: 0.85rem;
                min-width: 80px;
            }
        }

        /* Для iPhone с вырезом (notch) */
        @supports (padding: max(0px)) {
            .video-controls {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Контейнер видео -->
        <div class="video-container">
            <video id="mainVideo" autoplay muted playsinline webkit-playsinline>
                <source src="video/OurYear.mp4" type="video/mp4">
            </video>
        </div>
        <!-- Блок кнопок по центру поверх видео -->
        <div class="video-controls">
            <button id="skipBtn" class="story-button">Пропустить</button>
            <button id="replayBtn" class="story-button">Смотреть заново</button>
        </div>
    </div>

    <script>
        // DOM элементы
        const video = document.getElementById('mainVideo');
        const skipBtn = document.getElementById('skipBtn');
        const replayBtn = document.getElementById('replayBtn');

        // Переход на страницу истории
        function goToStory() {
            window.location.href = 'story.html';
        }

        // Событие окончания видео
        video.addEventListener('ended', goToStory);
        // Клик по кнопке пропуска
        skipBtn.addEventListener('click', goToStory);
        
        // Клик по кнопке повтора
        replayBtn.addEventListener('click', () => {
            video.currentTime = 0;
            video.play();
        });

        // Запуск видео по первому касанию на мобилке
        document.addEventListener('touchstart', () => {
            if (video.paused) video.play();
        }, { once: true });
    </script>
</body>
</html>
